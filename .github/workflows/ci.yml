name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-ubuntu:
    name: Ubuntu (Qt6, system packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            qt6-base-dev qt6-websockets-dev \
            libprotobuf-dev protobuf-compiler

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: showeq-qt-linux
          path: build/showeq-qt

  build-fedora:
    name: Fedora (Qt6, dnf)
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install git for checkout
        run: dnf install -y git

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        run: |
          dnf install -y \
            cmake ninja-build gcc-c++ \
            qt6-qtbase-devel qt6-qtwebsockets-devel \
            protobuf-devel protobuf-compiler

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --parallel

  build-windows:
    name: Windows (Qt6, vcpkg)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Export GHA cache env for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - name: Configure
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: showeq-qt-windows
          path: build/Release/showeq-qt.exe

  build-appimage:
    name: AppImage (Ubuntu 22.04)
    runs-on: ubuntu-latest
    container: ubuntu:22.04
    needs: [build-ubuntu, build-fedora, build-windows]
    env:
      DEBIAN_FRONTEND: noninteractive
      # linuxdeploy itself ships as an AppImage; FUSE isn't available in
      # GHA containers, so extract-and-run is the supported path.
      APPIMAGE_EXTRACT_AND_RUN: "1"
      # Stable filename for the rolling continuous release.
      VERSION: continuous
    steps:
      - name: Install build deps
        run: |
          apt-get update -q
          apt-get install -y --no-install-recommends \
            ca-certificates curl git \
            cmake ninja-build build-essential \
            qt6-base-dev qt6-websockets-dev \
            libprotobuf-dev protobuf-compiler \
            libgl1-mesa-dev libxkbcommon-dev \
            file desktop-file-utils

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --parallel

      - name: Build AppImage
        run: bash packaging/build-appimage.sh build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: showeq-qt-appimage
          path: build/showeq-qt-*.AppImage

  publish-rolling:
    name: Publish continuous AppImage
    runs-on: ubuntu-latest
    needs: build-appimage
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: showeq-qt-appimage
          path: dist

      - name: Update "continuous" prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          target_commitish: ${{ github.sha }}
          name: Continuous build
          prerelease: true
          # Replace assets so the release always reflects HEAD of main.
          files: dist/*.AppImage
          body: |
            Rolling AppImage build from the tip of `main`.

            Built on Ubuntu 22.04 (glibc 2.35), so it should run on most
            modern Linux distros without recompiling Qt or libc.

            Commit: `${{ github.sha }}`

            Usage:
            ```
            chmod +x showeq-qt-continuous-x86_64.AppImage
            ./showeq-qt-continuous-x86_64.AppImage
            ```
