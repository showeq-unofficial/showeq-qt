name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-ubuntu:
    name: Ubuntu (Qt6, system packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            qt6-base-dev qt6-websockets-dev \
            libprotobuf-dev protobuf-compiler

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: showeq-qt-linux
          path: build/showeq-qt

  build-fedora:
    name: Fedora (Qt6, dnf)
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install git for checkout
        run: dnf install -y git

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install deps
        run: |
          dnf install -y \
            cmake ninja-build gcc-c++ \
            qt6-qtbase-devel qt6-qtwebsockets-devel \
            protobuf-devel protobuf-compiler

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --parallel

  build-windows:
    name: Windows (Qt6 binaries + protobuf from source)
    runs-on: windows-latest
    # Recipe: prebuilt Qt6 via aqt (jurplel/install-qt-action) + protobuf
    # built from source once and actions/cache'd by tag. vcpkg dropped
    # because (a) Qt6 was 90% of the time and (b) microsoft removed the
    # `x-gha` binary cache backend, so lukka/run-vcpkg rebuilt every run.
    env:
      PROTOBUF_VERSION: v28.3
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtwebsockets
          cache: true

      - name: Cache protobuf install tree
        id: cache-protobuf
        uses: actions/cache@v4
        with:
          path: protobuf-install
          key: protobuf-${{ env.PROTOBUF_VERSION }}-windows-x64-msvc2022

      - name: Build protobuf from source
        if: steps.cache-protobuf.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch $env:PROTOBUF_VERSION `
            https://github.com/protocolbuffers/protobuf protobuf-src
          cmake -S protobuf-src -B protobuf-src\build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}\protobuf-install" `
            -Dprotobuf_BUILD_TESTS=OFF `
            -Dprotobuf_BUILD_EXAMPLES=OFF `
            -Dprotobuf_BUILD_LIBPROTOC=ON `
            -Dprotobuf_BUILD_SHARED_LIBS=OFF `
            -Dprotobuf_ABSL_PROVIDER=module
          cmake --build protobuf-src\build --config Release --parallel
          cmake --install protobuf-src\build --config Release

      - name: Configure
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}\protobuf-install" `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Stage Windows release with windeployqt
        # install-qt-action puts Qt's bin dir on PATH, so `windeployqt`
        # resolves directly. It copies Qt6Core/Gui/Widgets/WebSockets/
        # Network DLLs + the platform plugin next to the exe so the zip
        # runs on a clean Windows machine.
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item build\Release\showeq-qt.exe release\
          windeployqt release\showeq-qt.exe --release --no-translations `
            --no-system-d3d-compiler --no-opengl-sw
          Compress-Archive -Path release\* -DestinationPath build\showeq-qt-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: showeq-qt-windows
          path: build/showeq-qt-windows-x64.zip

  build-appimage:
    name: AppImage (Debian bookworm)
    runs-on: ubuntu-latest
    # bookworm has glibc 2.36 + ships qt6-websockets-dev (Ubuntu 22.04/jammy
    # only ships the runtime stub; the -dev pkg first appeared in noble/24.04).
    container: debian:bookworm-slim
    needs: [build-ubuntu, build-fedora, build-windows]
    env:
      DEBIAN_FRONTEND: noninteractive
      # linuxdeploy itself ships as an AppImage; FUSE isn't available in
      # GHA containers, so extract-and-run is the supported path.
      APPIMAGE_EXTRACT_AND_RUN: "1"
    steps:
      - name: Install build deps
        run: |
          apt-get update -q
          apt-get install -y --no-install-recommends \
            ca-certificates curl git \
            cmake ninja-build build-essential \
            qt6-base-dev qt6-websockets-dev \
            libprotobuf-dev protobuf-compiler \
            libgl-dev libxkbcommon-dev \
            file desktop-file-utils

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compute short SHA for filename
        # Inside the container, git describe trips over "dubious ownership"
        # (host UID 1001 vs container root) and the script falls back to
        # 0.0.0. Set VERSION explicitly so the asset name carries the SHA.
        run: echo "VERSION=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --parallel

      - name: Build AppImage
        run: bash packaging/build-appimage.sh build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: showeq-qt-appimage
          path: build/showeq-qt-*.AppImage

  publish-rolling:
    name: Publish dev release
    runs-on: ubuntu-latest
    needs: build-appimage
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: showeq-qt-appimage
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: showeq-qt-windows
          path: dist-win

      - name: Stage Windows binary with short SHA
        run: |
          mv dist-win/showeq-qt-windows-x64.zip \
             "dist/showeq-qt-${GITHUB_SHA::7}-windows-x64.zip"
          ls -la dist/

      - name: Wipe stale assets on dev release
        # SHA-bearing filenames change every push, so softprops can't clobber
        # them by name — strip the old ones first to keep the release tidy.
        run: |
          if gh release view dev --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release view dev --repo "${{ github.repository }}" --json assets \
              --jq '.assets[].name' \
            | while read -r name; do
                gh release delete-asset dev "$name" --yes \
                  --repo "${{ github.repository }}" || true
              done
          fi

      - name: Update "dev" prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          target_commitish: ${{ github.sha }}
          name: Dev build
          prerelease: true
          files: |
            dist/showeq-qt-*-x86_64.AppImage
            dist/showeq-qt-*-windows-x64.zip
          body: |
            Rolling dev build from the tip of `main`. Asset filenames carry
            the short commit SHA so each build is identifiable.

            Linux AppImage built on Debian bookworm (glibc 2.36) — runs on
            Ubuntu 22.04+, Debian 12+, Fedora 36+, RHEL/Alma 9.4+.
            Windows zip is self-contained (Qt6 DLLs bundled via windeployqt).

            Commit: `${{ github.sha }}`

            Usage:
            ```
            # Linux
            chmod +x showeq-qt-*-x86_64.AppImage
            ./showeq-qt-*-x86_64.AppImage

            # Windows: extract the zip and run showeq-qt.exe
            ```
